name: Crypto Price Update
on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch BTC price
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          BTC=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              price = d['bitcoin']['usd']
              change = round(d['bitcoin']['usd_24h_change'], 2)
              print(f'{price} ({change}%)')
          except:
              print('N/A')
          ")
          echo "| $DATE | BTC: \$$BTC |" >> prices.md
      - name: Commit
        run: |
         git config user.email "cryptonix65@gmail.com"
         git config user.name "cryptonix65"
          git add .
          git commit -m "btc: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
